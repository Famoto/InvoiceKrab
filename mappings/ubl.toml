canonical_key = "LineVatRate"

# PRICE DETAILS (BG-29)
[InvoiceLine.Price.PriceAmount]
type = "decimal"
canonical_key = "ItemNetPrice"

[InvoiceLine.Price.BaseQuantity]
type = "decimal"
canonical_key = "ItemPriceBaseQuantity"

# INVOICE LINE ALLOWANCES / CHARGES (BG-27 / BG-28) — collection nested inside
# the invoice line, discriminated by ChargeIndicator (true = charge BG-28,
# false = allowance BG-27).
[InvoiceLine.AllowanceCharge]
type = "collection"
canonical_key = "LineAllowanceCharges"

[InvoiceLine.AllowanceCharge.ChargeIndicator]
type = "boolean"
canonical_key = "LineChargeIndicator"

[InvoiceLine.AllowanceCharge.Amount]
type = "decimal"
canonical_key = "LineAllowanceChargeAmount"

[InvoiceLine.AllowanceCharge.BaseAmount]
type = "decimal"
canonical_key = "LineAllowanceChargeBaseAmount"

[InvoiceLine.AllowanceCharge.MultiplierFactorNumeric]
type = "decimal"
canonical_key = "LineAllowanceChargePercentage"

[InvoiceLine.AllowanceCharge.AllowanceChargeReason]
type = "string"
canonical_key = "LineAllowanceChargeReason"

[InvoiceLine.AllowanceCharge.AllowanceChargeReasonCode]
type = "string"
canonical_key = "LineAllowanceChargeReasonCode"

# ITEM ATTRIBUTES (BG-32) — collection nested inside the invoice line's item.
[InvoiceLine.Item.AdditionalItemProperty]
type = "collection"
canonical_key = "ItemAttributes"

[InvoiceLine.Item.AdditionalItemProperty.Name]
type = "string"
canonical_key = "ItemAttributeName"

[InvoiceLine.Item.AdditionalItemProperty.Value]
