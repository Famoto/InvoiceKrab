canonical_key = "ItemStandardIdentifier"

[InvoiceLine.Item.CommodityClassification.ItemClassificationCode]
type = "string"
canonical_key = "ItemClassificationIdentifier"

[InvoiceLine.Item.OriginCountry.IdentificationCode]
type = "string"
canonical_key = "ItemCountryOfOrigin"
