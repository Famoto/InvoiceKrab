# UN/CEFACT Cross Industry Invoice (CII) reference spoke — the full EN 16931
# semantic data model (business terms BT-1…BT-163, groups BG-1…BG-32) bound to the
# UN/CEFACT `CrossIndustryInvoice` (rsm) tree instead of the OASIS UBL `Invoice`
# tree. It is the CII-syntax peer of `ubl.toml`: every canonical hub key that the
# UBL spokes define is mapped here onto its `ram:`-local element path, so a
# document in either syntax round-trips through the shared hub. This tree is
# inherit-only (`disabled = true`): Factur-X/ZUGFeRD inherit it; plain CII emits no
# spoke of its own.
#
# Each node's dotted id IS its XML element path under `[meta].root`
# (`CrossIndustryInvoice`); the compiler synthesizes the typed source struct from
# those ids and infers interior elements (`SupplyChainTradeTransaction`,
# `SellerTradeParty`, `PostalTradeAddress`, …) from their leaf descendants — never
# written as tables. XML local names (no `ram:`/`rsm:`/`udt:` prefix) match
# quick-xml's namespace-local serde layer, so the same mapping reads real
# namespaced CII (and Factur-X/ZUGFeRD) documents and bare-name fixtures alike.
#
# CII conventions, shared with the UBL-syntax spokes (see crates/einvoice-dsl):
#   * Dates live in a `DateTimeString` element; the sibling `format` attribute
#     (102 / 616) is not modelled.
#   * Amounts map as scale-preserving decimals; their `@currencyID` attribute is
#     modelled only for the shared `PayableAmount`/`TaxTotalAmount` currency keys.
#   * Document- and line-level `SpecifiedTradeAllowanceCharge` are single
#     collections carrying `ChargeIndicator/Indicator` (true = charge BG-21/BG-28,
#     false = allowance BG-20/BG-27), so allowance vs charge is preserved as data.
#   * Two EN 16931 terms are intentionally NOT mapped because CII models them as
#     predicate-discriminated siblings of an element already mapped, which the DSL
#     forbids (model as a collection instead, not a predicate split):
#       - BT-7 Tax point date — lives per `ApplicableTradeTax`, no header scalar.
#       - BT-17 Tender or lot reference — a `TypeCode`-tagged sibling of the
#         `AdditionalReferencedDocument` elements captured by `SupportingDocuments`.
[meta]
doc_format = "cii-invoice"
format_version = "16931"
mapping_version = "1.0"
source_model = "cii-invoice:en16931"
canonical_model = "canonical-invoice:1.0"
root = "CrossIndustryInvoice"
# Inherit-only base: Factur-X/ZUGFeRD inherit this tree; plain CII emits no spoke.
disabled = true
# CII is the base cross-industry syntax (Factur-X/ZUGFeRD are its CIUS profiles);
# it declares no discriminator and acts as the fallback for the CII tree.
detect = []

# ===========================================================================
# PROCESS CONTROL (BG-2) — ExchangedDocumentContext
# ===========================================================================
[CrossIndustryInvoice.ExchangedDocumentContext.GuidelineSpecifiedDocumentContextParameter.ID]
type = "identifier"
canonical_key = "SpecificationId"
normalize = ["trim"]

[CrossIndustryInvoice.ExchangedDocumentContext.BusinessProcessSpecifiedDocumentContextParameter.ID]
type = "identifier"
canonical_key = "BusinessProcessType"
normalize = ["trim"]

# ===========================================================================
# HEADER (ExchangedDocument) — BT-1, BT-3, BT-2, BG-1
# ===========================================================================
[CrossIndustryInvoice.ExchangedDocument.ID]
type = "identifier"
canonical_key = "InvoiceNumber"
required = true
normalize = ["trim", "empty_as_missing"]

[CrossIndustryInvoice.ExchangedDocument.TypeCode]
type = "string"
canonical_key = "InvoiceTypeCode"

# BT-2 issue date: the text of `IssueDateTime/DateTimeString` (format 102).
[CrossIndustryInvoice.ExchangedDocument.IssueDateTime.DateTimeString]
type = "date"
canonical_key = "IssueDate"

# BG-1 INVOICE NOTE — the subject-code prefix (BT-21) is carried alongside in
# CII's `IncludedNote/SubjectCode`; only the note text (BT-22) is modelled.
[CrossIndustryInvoice.ExchangedDocument.IncludedNote.Content]
type = "string"
canonical_key = "InvoiceNote"

